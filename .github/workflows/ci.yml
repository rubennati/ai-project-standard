name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate markdown files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f AGENTS.md

      - name: Basic repository health
        run: |
          test -d docs
          test -d .ai
