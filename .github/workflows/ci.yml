name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly strict link check (Mondays 06:00 UTC).
    - cron: '0 6 * * 1'

# Minimum permissions for the whole workflow; jobs may broaden as needed.
# See docs/security-baseline.md for the rationale.
permissions:
  contents: read

jobs:
  docs-check:
    name: Structural docs check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate required files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f AGENTS.md

      - name: Basic repository health
        run: |
          test -d docs
          test -d .ai

  profile-completeness:
    name: Profile completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run profile check
        run: bash .github/scripts/check-profiles.sh

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md
            !site/node_modules
            !site/dist
            !site/.astro
            !.ai

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Strict on the weekly cron; advisory on PRs and pushes (external
          # 4xx/5xx flakes are common and shouldn't block reviews).
          fail: ${{ github.event_name == 'schedule' }}
          args: >-
            --cache
            --max-cache-age 7d
            --no-progress
            --exclude-mail
            --exclude-loopback
            './**/*.md'
