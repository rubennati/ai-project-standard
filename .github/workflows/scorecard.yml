name: OpenSSF Scorecard

# Generates an OpenSSF Scorecard security score for the repository.
# Results are published to the OpenSSF API (used by the badge in README.md)
# and uploaded to GitHub's code-scanning tab as SARIF.
#
# Docs: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    # Weekly on Mondays at 06:30 UTC (30 minutes after the link-check cron).
    - cron: '30 6 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

# OIDC + sarif upload + read access to repo metadata.
permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results to the OpenSSF API so the badge stays current.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 7

      - name: Upload to GitHub code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: results.sarif
