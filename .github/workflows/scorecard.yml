name: OpenSSF Scorecard

# Generates an OpenSSF Scorecard security score for the repository.
# Results are published to the OpenSSF API (used by the badge in README.md)
# and uploaded to GitHub's code-scanning tab as SARIF.
#
# Docs: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    # Weekly on Mondays at 06:30 UTC (30 minutes after the link-check cron).
    - cron: '30 6 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

# OIDC + sarif upload + read access to repo metadata.
permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results to the OpenSSF API so the badge stays current.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 7

      - name: Upload to GitHub code scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v3
        with:
          sarif_file: results.sarif
